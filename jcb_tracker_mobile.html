
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#185FA5;--blue-dk:#0C447C;--green:#3B6D11;--red:#A32D2D;--amber:#854F0B}
body{font-family:var(--font-sans);font-size:15px}
.wrap{padding:12px;max-width:600px;margin:0 auto}
.app-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.app-header h1{font-size:17px;font-weight:500;color:var(--color-text-primary)}
.month-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;scrollbar-width:none}
.month-scroll::-webkit-scrollbar{display:none}
.mcard{flex:0 0 auto;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 14px;text-align:center;min-width:110px}
.mcard .val{font-size:20px;font-weight:500;color:var(--color-text-primary);line-height:1.2}
.mcard .lbl{font-size:11px;color:var(--color-text-secondary);margin-top:3px}
.date-bar{display:flex;align-items:center;gap:10px;background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:10px 12px;margin-bottom:14px}
.date-bar label{font-size:13px;color:var(--color-text-secondary);white-space:nowrap}
.date-bar input[type=date]{flex:1;font-size:14px;padding:6px 8px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);min-width:0}
.day-pill{font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px;background:#E6F1FB;color:#0C447C;white-space:nowrap}
.tabs{display:flex;gap:6px;margin-bottom:12px}
.tab{flex:1;padding:10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);font-size:14px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s}
.tab.active{background:#185FA5;color:#fff;border-color:#185FA5}
.jcb-form{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:12px;color:var(--color-text-secondary);font-weight:500}
.field input,.field select,.field textarea{font-size:15px;padding:10px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);width:100%;-webkit-appearance:none}
.field input:focus,.field select:focus{outline:none;border-color:var(--blue)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.calc-row{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.calc-row span{font-size:13px;color:var(--color-text-secondary)}
.calc-row strong{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.btn-big{width:100%;padding:13px;border-radius:var(--border-radius-lg);border:none;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px}
.btn-big.primary{background:#185FA5;color:#fff}
.btn-big.primary:active{background:#0C447C}
.btn-big.ghost{background:transparent;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary)}
.btn-big.ghost:active{background:var(--color-background-secondary)}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.section-head h2{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.small-btn{padding:7px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.small-btn.dl{background:#3B6D11;color:#fff;border-color:#3B6D11}
.entry-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px;margin-bottom:8px}
.entry-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.entry-title{display:flex;align-items:center;gap:6px;font-weight:500;font-size:14px;color:var(--color-text-primary)}
.chip{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.chip.j1{background:#E6F1FB;color:#0C447C}
.chip.j2{background:#FAEEDA;color:#854F0B}
.entry-meta{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;font-size:12px;color:var(--color-text-secondary)}
.entry-meta span b{color:var(--color-text-primary);font-weight:500}
.del-btn{background:transparent;border:none;padding:4px;cursor:pointer;color:#A32D2D;font-size:16px;line-height:1}
.total-bar{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 14px;display:flex;justify-content:space-around;margin-bottom:14px;gap:8px}
.total-bar div{text-align:center}
.total-bar .tv{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.total-bar .tl{font-size:11px;color:var(--color-text-secondary)}
.empty{text-align:center;padding:32px 16px;color:var(--color-text-secondary);font-size:14px}
.month-sel{font-size:13px;padding:6px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary)}
hr{border:none;border-top:0.5px solid var(--color-border-tertiary);margin:16px 0}
</style>

<div class="wrap">
  <div class="app-header">
    <i class="ti ti-bulldozer" style="font-size:22px;color:#185FA5" aria-hidden="true"></i>
    <h1>JCB work tracker</h1>
  </div>

  <div class="month-scroll" id="monthScroll">
    <div class="mcard"><div class="val" id="mDays">0</div><div class="lbl">Working days</div></div>
    <div class="mcard"><div class="val" id="mHours">0h</div><div class="lbl">Total hours</div></div>
    <div class="mcard"><div class="val" id="mJ1">0h</div><div class="lbl">JCB 1 hours</div></div>
    <div class="mcard"><div class="val" id="mJ2">0h</div><div class="lbl">JCB 2 hours</div></div>
    <div class="mcard"><div class="val" id="mPay">₹0</div><div class="lbl">Est. payment</div></div>
    <div class="mcard"><div class="val" id="mCount">0</div><div class="lbl">Total entries</div></div>
  </div>

  <div class="date-bar">
    <label><i class="ti ti-calendar" aria-hidden="true"></i></label>
    <input type="date" id="workDate" />
    <span class="day-pill" id="dayPill">—</span>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab1" onclick="switchTab(1)">
      <i class="ti ti-bulldozer" aria-hidden="true"></i> JCB 1
    </div>
    <div class="tab" id="tab2" onclick="switchTab(2)">
      <i class="ti ti-bulldozer" aria-hidden="true"></i> JCB 2
    </div>
  </div>

  <div id="form1" class="jcb-form">
    <div class="field"><label>Operator name</label><input type="text" id="j1op" placeholder="Enter operator name" /></div>
    <div class="field"><label>Work area / location</label><input type="text" id="j1area" placeholder="e.g. North field" /></div>
    <div class="field"><label>Work description</label><input type="text" id="j1desc" placeholder="e.g. Excavation" /></div>
    <div class="two-col">
      <div class="field"><label>Start time</label><input type="time" id="j1start" onchange="calcLive(1)" /></div>
      <div class="field"><label>End time</label><input type="time" id="j1end" onchange="calcLive(1)" /></div>
    </div>
    <div class="two-col">
      <div class="field"><label>Break (min)</label><input type="number" id="j1break" min="0" value="0" onchange="calcLive(1)" /></div>
      <div class="field"><label>Rate (₹/hr)</label><input type="number" id="j1rate" placeholder="e.g. 500" onchange="calcLive(1)" /></div>
    </div>
    <div class="calc-row">
      <span><i class="ti ti-clock" aria-hidden="true"></i> Calculated hours</span>
      <strong id="j1calc">—</strong>
    </div>
    <div class="field"><label>Remarks</label><input type="text" id="j1rem" placeholder="Optional note" /></div>
    <button class="btn-big primary" onclick="addEntry(1)"><i class="ti ti-plus" aria-hidden="true"></i> Add JCB 1 entry</button>
    <button class="btn-big ghost" onclick="resetJCB(1)"><i class="ti ti-refresh" aria-hidden="true"></i> Reset form</button>
  </div>

  <div id="form2" class="jcb-form" style="display:none">
    <div class="field"><label>Operator name</label><input type="text" id="j2op" placeholder="Enter operator name" /></div>
    <div class="field"><label>Work area / location</label><input type="text" id="j2area" placeholder="e.g. South field" /></div>
    <div class="field"><label>Work description</label><input type="text" id="j2desc" placeholder="e.g. Levelling" /></div>
    <div class="two-col">
      <div class="field"><label>Start time</label><input type="time" id="j2start" onchange="calcLive(2)" /></div>
      <div class="field"><label>End time</label><input type="time" id="j2end" onchange="calcLive(2)" /></div>
    </div>
    <div class="two-col">
      <div class="field"><label>Break (min)</label><input type="number" id="j2break" min="0" value="0" onchange="calcLive(2)" /></div>
      <div class="field"><label>Rate (₹/hr)</label><input type="number" id="j2rate" placeholder="e.g. 500" onchange="calcLive(2)" /></div>
    </div>
    <div class="calc-row">
      <span><i class="ti ti-clock" aria-hidden="true"></i> Calculated hours</span>
      <strong id="j2calc">—</strong>
    </div>
    <div class="field"><label>Remarks</label><input type="text" id="j2rem" placeholder="Optional note" /></div>
    <button class="btn-big primary" onclick="addEntry(2)"><i class="ti ti-plus" aria-hidden="true"></i> Add JCB 2 entry</button>
    <button class="btn-big ghost" onclick="resetJCB(2)"><i class="ti ti-refresh" aria-hidden="true"></i> Reset form</button>
  </div>

  <hr>

  <div class="section-head">
    <h2><i class="ti ti-table" aria-hidden="true"></i> Entries</h2>
    <div style="display:flex;gap:6px;align-items:center">
      <select class="month-sel" id="filterMonth" onchange="renderList()"></select>
      <button class="small-btn dl" onclick="downloadCSV()"><i class="ti ti-download" aria-hidden="true"></i> CSV</button>
    </div>
  </div>

  <div class="total-bar" id="totalBar" style="display:none">
    <div><div class="tv" id="tHours">0h</div><div class="tl">Hours</div></div>
    <div><div class="tv" id="tJ1">0h</div><div class="tl">JCB 1</div></div>
    <div><div class="tv" id="tJ2">0h</div><div class="tl">JCB 2</div></div>
    <div><div class="tv" id="tPay">₹0</div><div class="tl">Payment</div></div>
  </div>

  <div id="entryList"><div class="empty"><i class="ti ti-clipboard" style="font-size:32px;display:block;margin-bottom:8px" aria-hidden="true"></i>No entries yet.<br>Add your first entry above.</div></div>
</div>

<script>
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
let entries=[];
try{entries=JSON.parse(localStorage.getItem('jcbData')||'[]')}catch(e){entries=[]}
let lastDate='';
let activeTab=1;

function today(){return new Date().toISOString().split('T')[0]}

function init(){
  const wd=document.getElementById('workDate');
  wd.value=today();
  lastDate=today();
  wd.addEventListener('change',function(){
    updateDayPill();
    if(this.value!==lastDate){resetJCB(1);resetJCB(2)}
  });
  updateDayPill();
  populateFilter();
  renderList();
  updateCards();
}

function updateDayPill(){
  const v=document.getElementById('workDate').value;
  if(!v){document.getElementById('dayPill').textContent='—';return}
  const d=new Date(v+'T00:00:00');
  document.getElementById('dayPill').textContent=DAYS[d.getDay()];
}

function switchTab(n){
  activeTab=n;
  document.getElementById('tab1').classList.toggle('active',n===1);
  document.getElementById('tab2').classList.toggle('active',n===2);
  document.getElementById('form1').style.display=n===1?'block':'none';
  document.getElementById('form2').style.display=n===2?'block':'none';
}

function calcHours(start,end,brk){
  if(!start||!end)return null;
  const[sh,sm]=start.split(':').map(Number);
  const[eh,em]=end.split(':').map(Number);
  const mins=(eh*60+em)-(sh*60+sm)-(parseInt(brk)||0);
  return Math.max(0,Math.round(mins*10/60)/10);
}

function calcLive(jcb){
  const p=jcb===1?'j1':'j2';
  const h=calcHours(
    document.getElementById(p+'start').value,
    document.getElementById(p+'end').value,
    document.getElementById(p+'break').value
  );
  const rate=parseFloat(document.getElementById(p+'rate').value)||0;
  const el=document.getElementById(p+'calc');
  if(h===null){el.textContent='—';return}
  el.textContent=h+'h'+(rate?' · ₹'+Math.round(h*rate):'');
}

function addEntry(jcb){
  const p=jcb===1?'j1':'j2';
  const date=document.getElementById('workDate').value;
  if(!date){alert('Please select a date.');return}
  const op=document.getElementById(p+'op').value.trim();
  if(!op){alert('Enter operator name for JCB '+jcb);return}
  const start=document.getElementById(p+'start').value;
  const end=document.getElementById(p+'end').value;
  if(!start||!end){alert('Enter start and end time for JCB '+jcb);return}
  const brk=document.getElementById(p+'break').value||0;
  const rate=parseFloat(document.getElementById(p+'rate').value)||0;
  const hours=calcHours(start,end,brk);
  const entry={
    id:Date.now(),date,jcb,
    op,
    area:document.getElementById(p+'area').value.trim(),
    desc:document.getElementById(p+'desc').value.trim(),
    start,end,brk,hours,rate,
    amount:Math.round(hours*rate),
    rem:document.getElementById(p+'rem').value.trim()
  };
  entries.push(entry);
  save();
  lastDate=date;
  populateFilter();
  renderList();
  updateCards();
  resetJCB(jcb);
}

function resetJCB(jcb){
  const p=jcb===1?'j1':'j2';
  ['op','area','desc','start','end','rem'].forEach(f=>document.getElementById(p+f).value='');
  document.getElementById(p+'break').value=0;
  document.getElementById(p+'rate').value='';
  document.getElementById(p+'calc').textContent='—';
}

function deleteEntry(id){
  if(!confirm('Delete this entry?'))return;
  entries=entries.filter(e=>e.id!==id);
  save();
  populateFilter();
  renderList();
  updateCards();
}

function save(){
  try{localStorage.setItem('jcbData',JSON.stringify(entries))}catch(e){}
}

function getMonthKey(d){return d.substring(0,7)}

function populateFilter(){
  const months=[...new Set(entries.map(e=>getMonthKey(e.date)))].sort().reverse();
  const sel=document.getElementById('filterMonth');
  const cur=sel.value;
  sel.innerHTML='';
  if(!months.length){sel.innerHTML='<option value="">All</option>';return}
  months.forEach(m=>{
    const[y,mo]=m.split('-');
    const lbl=new Date(y,parseInt(mo)-1,1).toLocaleString('default',{month:'short',year:'numeric'});
    const opt=document.createElement('option');
    opt.value=m;opt.textContent=lbl;sel.appendChild(opt);
  });
  if(cur&&months.includes(cur))sel.value=cur;
}

function getFiltered(){
  const m=document.getElementById('filterMonth').value;
  if(!m)return entries;
  return entries.filter(e=>getMonthKey(e.date)===m);
}

function renderList(){
  const data=getFiltered().sort((a,b)=>b.date.localeCompare(a.date)||a.jcb-b.jcb);
  const el=document.getElementById('entryList');
  const tb=document.getElementById('totalBar');
  if(!data.length){
    el.innerHTML='<div class="empty"><i class="ti ti-clipboard" style="font-size:32px;display:block;margin-bottom:8px" aria-hidden="true"></i>No entries for this period.</div>';
    tb.style.display='none';return;
  }
  let tH=0,tA=0,j1h=0,j2h=0;
  let html='';
  data.forEach(e=>{
    const d=new Date(e.date+'T00:00:00');
    const day=DAYS[d.getDay()].substring(0,3);
    tH+=e.hours;tA+=e.amount;
    if(e.jcb===1)j1h+=e.hours;else j2h+=e.hours;
    html+=`<div class="entry-card">
      <div class="entry-top">
        <div class="entry-title">
          <span class="chip j${e.jcb}">JCB ${e.jcb}</span>
          <span>${e.op}</span>
        </div>
        <button class="del-btn" onclick="deleteEntry(${e.id})" aria-label="Delete entry"><i class="ti ti-trash" aria-hidden="true"></i></button>
      </div>
      <div class="entry-meta">
        <span><b>${e.date}</b> ${day}</span>
        <span><b>${e.start}–${e.end}</b>${e.brk>0?' (−'+e.brk+'m)':''}</span>
        <span>Hours: <b>${e.hours}h</b></span>
        <span>Pay: <b>${e.amount?'₹'+e.amount.toLocaleString():'-'}</b></span>
        ${e.area?`<span>Area: <b>${e.area}</b></span>`:''}
        ${e.desc?`<span>Work: <b>${e.desc}</b></span>`:''}
        ${e.rem?`<span style="grid-column:1/-1">Note: <b>${e.rem}</b></span>`:''}
      </div>
    </div>`;
  });
  el.innerHTML=html;
  tb.style.display='flex';
  document.getElementById('tHours').textContent=Math.round(tH*10)/10+'h';
  document.getElementById('tJ1').textContent=Math.round(j1h*10)/10+'h';
  document.getElementById('tJ2').textContent=Math.round(j2h*10)/10+'h';
  document.getElementById('tPay').textContent='₹'+tA.toLocaleString();
}

function updateCards(){
  const m=today().substring(0,7);
  const md=entries.filter(e=>getMonthKey(e.date)===m);
  const wd=[...new Set(md.map(e=>e.date))].length;
  const tH=md.reduce((s,e)=>s+e.hours,0);
  const j1h=md.filter(e=>e.jcb===1).reduce((s,e)=>s+e.hours,0);
  const j2h=md.filter(e=>e.jcb===2).reduce((s,e)=>s+e.hours,0);
  const pay=md.reduce((s,e)=>s+e.amount,0);
  document.getElementById('mDays').textContent=wd;
  document.getElementById('mHours').textContent=Math.round(tH*10)/10+'h';
  document.getElementById('mJ1').textContent=Math.round(j1h*10)/10+'h';
  document.getElementById('mJ2').textContent=Math.round(j2h*10)/10+'h';
  document.getElementById('mPay').textContent='₹'+pay.toLocaleString();
  document.getElementById('mCount').textContent=entries.length;
}

function downloadCSV(){
  const data=getFiltered().sort((a,b)=>a.date.localeCompare(b.date)||a.jcb-b.jcb);
  if(!data.length){alert('No data to download.');return}
  let csv='Date,Day,JCB,Operator,Area,Work,Start,End,Hours,Rate,Amount,Remarks\n';
  let tH=0,tA=0;
  data.forEach(e=>{
    const day=DAYS[new Date(e.date+'T00:00:00').getDay()];
    csv+=`${e.date},${day},JCB ${e.jcb},"${e.op}","${e.area||''}","${e.desc||''}",${e.start},${e.end},${e.hours},${e.rate||0},${e.amount||0},"${e.rem||''}"\n`;
    tH+=e.hours;tA+=e.amount;
  });
  csv+=`,,,,,,,,${Math.round(tH*10)/10},,${tA},\n`;
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='JCB_log_'+document.getElementById('filterMonth').value+'.csv';
  a.click();
}

init();
</script>
